<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#e4e9e0">
  <meta name="description" content="רגע חמלה - כלי קצר לעצירה, נשימה וחמלה עצמית.">
  <title>רגע חמלה</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      color-scheme: light;
      --color-bg: #e4e9e0;
      --color-surface: #fdfcf8;
      --color-input: #faf9f7;
      --color-primary: #5f746d;
      --color-primary-deep: #294732;
      --color-primary-bg: #eef4ef;
      --color-primary-soft: rgba(95, 116, 109, .13);
      --color-primary-border: rgba(95, 116, 109, .16);
      --color-text: #4a4a4a;
      --color-muted: #85827d;
      --color-muted-strong: #74716c;
      --color-placeholder: #aaa;
      --color-border: rgba(0, 0, 0, .055);
      --color-white-border: rgba(255, 255, 255, .82);

      --shadow-shell: 0 30px 60px rgba(0, 0, 0, .06), 0 12px 24px rgba(0, 0, 0, .04), 0 4px 12px rgba(0, 0, 0, .02);
      --shadow-card: 0 14px 30px rgba(0, 0, 0, .04), 0 4px 12px rgba(0, 0, 0, .03), 0 1px 3px rgba(0, 0, 0, .015);
      --shadow-inner: inset 0 3px 6px rgba(0, 0, 0, .015), inset 0 1px 3px rgba(0, 0, 0, .01);
      --shadow-primary: 0 8px 20px rgba(95, 116, 109, .18);

      --radius-shell: 36px;
      --radius-field: 18px;
      --radius-pill: 999px;
      --shell-width: min(92vw, 414px);
      --shell-height: min(94svh, 844px);
      --screen-pad-x: clamp(22px, 6vw, 32px);
      --screen-pad-y: clamp(24px, 4.2svh, 40px);
      --ease-smooth: cubic-bezier(.2, .8, .2, 1);
      --ease-spring: cubic-bezier(.25, .8, .15, 1.15);
    }

    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    
    body {
      min-height: 100svh;
      width: 100vw;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: Heebo, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    button, textarea, a { font: inherit; }

    button {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: var(--radius-pill);
      background: var(--color-primary);
      color: #fff;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: -.2px;
      cursor: pointer;
      box-shadow: var(--shadow-primary);
      transition: transform .3s var(--ease-spring), box-shadow .3s var(--ease-spring), background-color .3s ease, opacity .24s ease;
      touch-action: manipulation;
    }
    button:active { transform: scale(.96); box-shadow: 0 4px 10px rgba(95, 116, 109, .18); }
    button:focus-visible, textarea:focus-visible, a:focus-visible { outline: 3px solid rgba(95, 116, 109, .28); outline-offset: 3px; }

    textarea {
      width: 100%;
      min-height: clamp(118px, 16svh, 148px);
      padding: 16px 17px;
      resize: none;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-field);
      background: var(--color-input);
      color: var(--color-text);
      font-size: 1.03rem;
      line-height: 1.55;
      box-shadow: var(--shadow-inner);
      transition: border-color .3s ease, box-shadow .3s ease, background-color .3s ease;
    }
    textarea:focus {
      border-color: transparent;
      background: #fff;
      box-shadow: 0 0 0 3px var(--color-primary-soft), var(--shadow-card);
      outline: none;
    }
    textarea::placeholder { color: #b0b0b0; }

    h1 {
      color: var(--color-primary-deep);
      font-size: clamp(2.55rem, 9vw, 3rem);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -.7px;
    }
    h2 {
      color: var(--color-primary);
      font-size: clamp(1.48rem, 5.4vw, 1.72rem);
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -.35px;
    }
    p { font-size: 1.05rem; line-height: 1.58; }

    .app-shell {
      position: relative;
      isolation: isolate;
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100svh;
      overflow: hidden;
      border: none;
      border-radius: 0;
      background:
        radial-gradient(circle at 16% 10%, rgba(255, 255, 255, .75) 0%, rgba(255, 255, 255, 0) 28%),
        radial-gradient(circle at 88% 18%, rgba(95, 116, 109, .14) 0%, rgba(95, 116, 109, 0) 30%),
        var(--color-surface);
      box-shadow: none;
    }
    
    .decor { position: absolute; pointer-events: none; z-index: -1; }
    .decor--top { inset-block-start: -56px; inset-inline-end: -54px; width: 190px; height: 190px; border-radius: 50%; background: radial-gradient(circle, rgba(232, 238, 226, .95) 0%, rgba(253, 252, 248, 0) 70%); filter: blur(10px); }
    .decor--bottom { inset-block-end: -64px; inset-inline-start: -60px; width: 210px; height: 210px; border-radius: 50%; background: radial-gradient(circle, rgba(232, 238, 226, .72) 0%, rgba(253, 252, 248, 0) 72%); filter: blur(10px); }
    .decor--leaf { inset-block-start: 18px; inset-inline-start: -24px; width: 170px; height: 170px; background: radial-gradient(ellipse at 30% 28%, rgba(95, 116, 109, .10) 0 11%, transparent 12%), radial-gradient(ellipse at 62% 38%, rgba(95, 116, 109, .08) 0 10%, transparent 11%), radial-gradient(ellipse at 44% 68%, rgba(95, 116, 109, .07) 0 11%, transparent 12%); filter: blur(9px); transform: rotate(-18deg); }

    .progress { position: absolute; inset-block-start: 0; inset-inline: 0; z-index: 5; height: 5px; overflow: hidden; background: rgba(0, 0, 0, .02); opacity: 0; transition: opacity .24s ease; }
    .progress.is-visible { opacity: 1; }
    .progress__bar { width: 0; height: 100%; border-radius: 0 4px 4px 0; background: var(--color-primary); transition: width .6s var(--ease-smooth); }

    .screen {
      display: none;
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      padding: var(--screen-pad-y) var(--screen-pad-x) calc(var(--screen-pad-y) - 4px);
      overflow-x: hidden;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .screen::-webkit-scrollbar { display: none; }
    .screen.is-active { display: grid; animation: fade-in-up .5s var(--ease-smooth) both; }

    .screen--home {
      grid-template-rows: minmax(18px, .55fr) auto minmax(24px, .36fr) auto minmax(20px, .28fr) auto minmax(22px, .5fr) auto;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }
    .home-title { grid-row: 2; }
    .home-copy { grid-row: 4; }
    .home-action { grid-row: 6; }
    .home-footer { grid-row: 8; width: 100%; color: var(--color-muted-strong); font-size: .
